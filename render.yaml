services:
  - type: web
    name: driftdater-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 wsgi:application
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FLASK_ENV
        value: production
      # Set these in Render dashboard (recommended) if you don't want them in YAML:
      # - SECRET_KEY
      # - DATABASE_URL (or use Render Postgres and link it)
      # - CORS_ORIGINS (include your static site URL)

  - type: web
    name: driftdater-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to your API service URL, e.g. https://driftdater-api.onrender.com
      - key: VITE_API_BASE_URL
        sync: false
